services:
  - type: web
    name: fynlo-api
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "bash backend/start.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fynlo-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fynlo-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: SECRET_KEY
        generateValue: true


  - type: redis
    name: fynlo-redis
    plan: free
    ipAllowList: []

databases:
  - name: fynlo-db
    plan: free
