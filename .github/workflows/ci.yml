name: Fynlo Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend Test Suite
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Pytest
        env:
          DATABASE_URL: sqlite:///:memory:
          ENVIRONMENT: testing
          JWT_SECRET_KEY: testing-jwt-secret-key-at-least-32-chars-long
        run: |
          cd backend
          python -m pytest

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Linter
        run: |
          cd frontend
          npm run lint

      - name: Run TypeScript Compiler Check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build Next.js Application
        env:
          NEXTAUTH_SECRET: testing-nextauth-secret-key-at-least-32-chars-long
          NEXTAUTH_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: |
          cd frontend
          npm run build
